name: Ghana S&L — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Job 1: Lint & Type Check
  # ──────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: |
          pip install ruff mypy

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 2: Ghana Compliance Validation Suite (BUILD GATE)
  # ──────────────────────────────────────────────────────────────────────────────
  compliance-tests:
    name: Ghana Compliance Tests (BUILD GATE)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov

      - name: Run compliance validation suite
        env:
          NODE_ENV: test
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          SECRET_KEY: test-secret-key-not-for-production
          MOCK_GHIPSS: "true"
          MOCK_CREDIT_BUREAUS: "true"
          MOCK_GHANA_CARD_API: "true"
        run: |
          pytest tests/test_compliance_guards.py \
            -v \
            --tb=short \
            --cov=api/compliance \
            --cov=api/validators \
            --cov=api/middleware \
            --cov=api/utils \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            -p no:warnings

      - name: Upload compliance coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compliance-coverage
          path: .coverage

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 3: Full Test Suite
  # ──────────────────────────────────────────────────────────────────────────────
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: compliance-tests
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: gsl
          POSTGRES_PASSWORD: gsl_test
          POSTGRES_DB: gsl_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run all tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql+psycopg2://gsl:gsl_test@localhost:5432/gsl_test
          SECRET_KEY: test-secret-key-not-for-production
          MOCK_GHIPSS: "true"
          MOCK_CREDIT_BUREAUS: "true"
          MOCK_GHANA_CARD_API: "true"
          ADMIN_EMAIL: admin@test.com
          ADMIN_PASSWORD: Admin@Test1234!
          INSTITUTION_NAME: "Test Institution"
          BOG_LICENCE_NUMBER: "MFI-TEST/2024"
        run: pytest tests/ -v --tb=short -x

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 4: Security Scan
  # ──────────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan (Bandit + Safety)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit safety

      - name: Bandit SAST scan
        run: bandit -r api/ -ll -ii -f json -o bandit-report.json || true

      - name: Safety dependency check
        run: safety check -r requirements.txt --json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: bandit-report.json

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 5: Build Docker Image
  # ──────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/savings-loans-python:latest
            ghcr.io/${{ github.repository_owner }}/savings-loans-python:${{ github.sha }}

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 6: Deploy to Render (staging) — automatic on main push
  # ──────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging (Render)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Accept: application/json"

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 7: Deploy to Production — manual approval required
  # ──────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production (Manual Approval)
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment: production   # GitHub environment with required reviewers
    steps:
      - name: Trigger production deploy
        run: |
          curl -X POST "${{ secrets.RENDER_PROD_DEPLOY_HOOK_URL }}" \
            -H "Accept: application/json"
      - name: Notify compliance team
        run: |
          echo "Production deployment triggered for ${{ github.sha }}. Compliance team notified."
